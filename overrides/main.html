{% extends "base.html" %}

{% block extrahead %}
  <meta name="robots" content="noindex, nofollow">
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var topic = document.querySelector('.md-header__title .md-header__topic:first-child');
      if (topic) {
        var sub = document.createElement('span');
        sub.className = 'scratch-subtitle';
        sub.textContent = '— Skin & Challenge Reference for Allergy Testing Clinical Handbook';
        topic.appendChild(sub);
      }
    });
  </script>
{% endblock %}
