site_name: SCRATCH
site_description: Skin & Challenge Reference for Allergy Testing Clinical Handbook — RPAH Clinical Immunology & Allergy
site_author: RPAH Allergy Nurses
site_url: https://scratch.pages.dev
copyright: "Copyright &copy; 2026 Department of Clinical Immunology and Allergy - Royal Prince Alfred Hospital"

theme:
  name: materialx
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.prune
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.footnote.tooltips
    - toc.follow
    - header.autohide
    - navigation.instant.prefetch
  topbar_style: primary
  icon:
    logo: material/test-tube
  favicon: assets/test-tube.svg

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+'
  - document-dates:
      type: timeago
      locale: en
      show_created: true
      show_updated: true
      show_author: false
      exclude:
        - index.md
        - '*/index.md'
  - tags:
      tags_file: reference/tags.md
  - meta
  - privacy
  - glightbox
  - table-reader:
      data_path: reference
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - abbr
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      auto_append:
        - includes/glossary.md
        - includes/suggest-edit.md
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols

extra_css:
  - stylesheets/extra.css

